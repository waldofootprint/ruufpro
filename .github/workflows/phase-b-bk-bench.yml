name: Phase B / BK — in-region footprint_lookup bench

# Measurement tooling, not a feature. Manually-triggered workflow that runs the
# 22-address RPC bench from a GitHub-hosted runner (Azure East US 2, Virginia —
# same geography as Supabase us-east-1 / AWS), disambiguating the laptop bench's
# ~130ms network floor from the actual DB-side latency.
#
# Target: geospatial project (vfmnjwpjxamtbuehmtrv). Publishable key is
# public-by-design (anon key equivalent); safe to inline. No secrets referenced.
#
# Expected outcomes:
#   - p95 ≤ 100ms  → BK closes with unambiguous stop-condition pass
#   - p95 > 100ms  → real surprise; paste back, no further function tuning
#                     (not a fix-loop trigger)

on:
  workflow_dispatch:

jobs:
  bench:
    name: 22-addr RPC bench from in-region runner
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/direct-mail-nfc

      - name: Runner location + network floor baseline
        run: |
          echo "=== runner identity ==="
          echo "os:     $(uname -a)"
          echo "egress: $(curl -s -4 https://api.ipify.org || echo '?')"
          echo
          echo "=== DNS + TCP+TLS baseline to Supabase geospatial project ==="
          # -w outputs connection timings. namelookup = DNS, connect = TCP handshake,
          # appconnect = TLS handshake, starttransfer = first byte (request-response).
          curl -s -o /dev/null \
            -w "dns=%{time_namelookup}s connect=%{time_connect}s tls=%{time_appconnect}s ttfb=%{time_starttransfer}s total=%{time_total}s code=%{http_code}\n" \
            "https://vfmnjwpjxamtbuehmtrv.supabase.co/rest/v1/" \
            -H "apikey: sb_publishable_kiHybjxwUW2NzNLu9N37tw_ewel0ygR" \
            -H "Authorization: Bearer sb_publishable_kiHybjxwUW2NzNLu9N37tw_ewel0ygR"
          echo
          echo "=== 3x warm-connection echo (connection-reuse proxy) ==="
          for i in 1 2 3; do
            curl -s -o /dev/null \
              -w "iter=$i total=%{time_total}s\n" \
              "https://vfmnjwpjxamtbuehmtrv.supabase.co/rest/v1/" \
              -H "apikey: sb_publishable_kiHybjxwUW2NzNLu9N37tw_ewel0ygR" \
              -H "Authorization: Bearer sb_publishable_kiHybjxwUW2NzNLu9N37tw_ewel0ygR"
          done

      - name: Python version
        run: python3 --version

      - name: Run 22-addr RPC bench
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://vfmnjwpjxamtbuehmtrv.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_kiHybjxwUW2NzNLu9N37tw_ewel0ygR
        run: |
          python3 scripts/phase_b/bench_ms_lookup_rpc.py

      - name: Upload bench report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-rpc-in-region
          path: .tmp/phase_b/bench-ms-rpc-*.json
          if-no-files-found: warn
          retention-days: 30
